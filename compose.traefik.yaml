
services:
  traefik:
    image: traefik:v3.3.2
    depends_on:
      traefik-socket:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "traefik healthcheck --ping"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
    labels:
      - traefik.enable=true
      - traefik.http.routers.traefik.entrypoints=websecure
      - traefik.http.routers.traefik.rule=Host(`traefik.tw050x.dev`)
      - traefik.http.routers.traefik.service=api@internal
      - traefik.http.routers.traefik.tls=true
    mem_limit: 200mb
    networks:
      services: {}
      traefik: {}
    ports:
      - 80:80
      - 443:443
    restart: always
    volumes:
      - ./service/traefik/compose.traefik.toml:/etc/traefik/traefik.toml
      - ./ca:/root/ca
      - ./certificates:/root/certificates

  traefik-socket:
    image: tecnativa/docker-socket-proxy:0.3.0
    environment:
      - CONTAINERS=1
      - SERVICES=1
      - TASKS=1
      - NETWORKS=1
    healthcheck:
      test: ["CMD-SHELL", "wget --spider http://localhost:2375/version || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    mem_limit: 200mb
    networks:
      traefik: {}
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
