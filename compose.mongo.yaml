
services:
  mongo-primary:
    command: --replSet rs0 --keyFile /etc/mongo-keyfile --bind_ip_all
    depends_on:
      mongo-secondary-a:
        condition: service_healthy
    env_file:
      - .env.service.mongo
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    image: mongo:8.0.12
    networks:
      - services
    ports:
      - 27017:27017
    restart: always
    volumes:
      - source: ./service/mongo/data/primary
        target: /data/db
        type: bind
      - read_only: true
        source: ./service/mongo/mongo-keyfile
        target: /etc/mongo-keyfile
        type: bind

  mongo-secondary-a:
    command: --replSet rs0 --keyFile /etc/mongo-keyfile --bind_ip_all
    env_file:
      - .env.service.mongo
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    image: mongo:8.0.12
    networks:
      - services
    ports:
      - 27018:27017
    restart: always
    volumes:
      - source: ./service/mongo/data/secondary-a
        target: /data/db
        type: bind
      - read_only: true
        source: ./service/mongo/mongo-keyfile
        target: /etc/mongo-keyfile
        type: bind
