
services:
  marketing:
    command: [ "yarn", "workspace", "@tw050x.net.service/marketing", "exec", "node", "--inspect=0.0.0.0:9229", "--watch", "artifact/serve.js" ]
    depends_on:
      assets:
        condition: service_healthy
      error:
        condition: service_healthy
      mongo-primary:
        condition: service_healthy
      traefik:
        condition: service_healthy
    environment:
      - NODE_ENV=development
    healthcheck:
      test: ["CMD-SHELL", "test -f /healthcheck && grep -q '^healthy$' /healthcheck"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
    image: tw050x.net.service/marketing:latest
    labels:
      - traefik.docker.network=services
      - traefik.enable=true
      - traefik.http.routers.marketing.entrypoints=websecure
      - traefik.http.routers.marketing.middlewares=http-request-not-found-error@file
      - traefik.http.routers.marketing.rule=Host(`tw050x.dev`) && PathPrefix(`/`)
      - traefik.http.routers.marketing.priority=1
      - traefik.http.routers.marketing.tls=true
      - traefik.http.services.marketing.loadbalancer.server.port=3000
      - traefik.http.services.marketing.loadbalancer.server.scheme=https
      - traefik.http.services.marketing.loadbalancer.serversTransport=secure@file
    mem_limit: 512mb
    networks:
      mongo: {}
      sessions: {}
      services: {}
    ports:
      - "9203:9229"
    pull_policy: never
    volumes:
      - source: ./.configs
        target: /srv/.configs
        type: bind
      - source: ./.secrets
        target: /srv/.secrets
        type: bind
      - source: ./ca
        target: /srv/ca
        type: bind
      - source: ./library
        target: /srv/library
        type: bind
      - source: ./log/service/marketing
        target: /log
        type: bind
      - source: ./node_modules
        target: /srv/node_modules
        type: bind
      - source: ./service/marketing
        target: /srv/service/marketing
        type: bind
      - source: ./tsconfig.json
        target: /srv/tsconfig.json
        type: bind
