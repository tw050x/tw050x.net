[api]
  insecure = false
  dashboard = true
  debug = true

[entryPoints.ping]
  address = ":8080"
[entryPoints.web]
  address = ":80"
[entryPoints.web.http.redirections.entryPoint]
  to = "websecure"
  scheme = "https"
[entryPoints.websecure]
  address = ":443"
  asDefault = true

[http.middlewares]
[http.middlewares.http-request-not-found-error.errors]
  status = ["404"]
  service = "error@docker"
  query = "/404"
[http.serversTransports]
[http.serversTransports.secure]
  insecureSkipVerify = true # This can be used as traefik is only for local development

[log]
  level = "DEBUG"

[ping]
  entryPoint = "ping"

[providers.file]
  directory = "/etc/traefik/"
  watch = true
[providers.docker]
  endpoint = "http://traefik-socket:2375"
  exposedByDefault = false

[[tls.certificates]]
  certFile = "/root/certificates/traefik.crt"
  keyFile = "/root/certificates/traefik.key"
