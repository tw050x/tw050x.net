
services:

  administration-service:
    command: [ "yarn", "workspace", "@tw050x.net/administration-service", "run", "nodemon", "--watch-path=/srv", "artifact/serve.js" ]
    # command: [ "tsx", "--inspect=0.0.0.0:9229", "--watch-path=/srv", "service/administration-service/serve.ts" ]
    depends_on:
      assets-service:
        condition: service_healthy
      authentication-service:
        condition: service_healthy
      localstack-service:
        condition: service_healthy
      mongo-service:
        condition: service_healthy
      traefik-service:
        condition: service_healthy
    env_file:
      - .env.administration-service
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/healthcheck || exit 1"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
    image: tw050x.net/administration-service:latest
    labels:
      - traefik.enable=true
      - traefik.http.routers.administration-service.entrypoints=websecure
      - traefik.http.routers.administration-service.middlewares=http-request-not-found-error@file
      - traefik.http.routers.administration-service.rule=Host(`tw050x.dev`) && PathPrefix(`/admin/`)
      - traefik.http.routers.administration-service.tls=true
      - traefik.http.services.administration-service.loadbalancer.server.port=3000
    mem_limit: 200mb
    pull_policy: never
    volumes:
      - source: ./tsconfig.json
        target: /srv/tsconfig.json
        type: bind
      - source: ./library
        target: /srv/library
        type: bind
      - source: ./log/administration-service
        target: /log
        type: bind
      - source: ./service/administration-service
        target: /srv/service/administration-service
        type: bind

  assets-service:
    depends_on:
      traefik-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/assets/healthcheck.txt || exit 1"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
    image: tw050x.net/assets-service:latest
    labels:
      - traefik.enable=true
      - traefik.http.routers.assets-service.entrypoints=websecure
      - traefik.http.routers.assets-service.middlewares=http-request-not-found-error@file
      - traefik.http.routers.assets-service.rule=Host(`tw050x.dev`) && PathPrefix(`/assets/`)
      - traefik.http.routers.assets-service.tls=true
      - traefik.http.services.assets-service.loadbalancer.server.port=3000
    mem_limit: 200mb
    pull_policy: never
    volumes:
      - source: ./service/assets-service/public
        target: /srv/service/assets-service/public
        type: bind

  authentication-service:
    command: [ "yarn", "workspace", "@tw050x.net/authentication-service", "run", "nodemon", "--watch-path=/srv", "artifact/serve.js" ]
    # command: [ "tsx", "--inspect=0.0.0.0:9229", "--watch-path=/srv", "service/authentication-service/serve.ts" ]
    depends_on:
      assets-service:
        condition: service_healthy
      localstack-service:
        condition: service_healthy
      mongo-service:
        condition: service_healthy
      traefik-service:
        condition: service_healthy
    env_file:
      - .env.authentication-service
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/healthcheck || exit 1"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
    image: tw050x.net/authentication-service:latest
    labels:
      - traefik.enable=true
      - traefik.http.routers.authentication-service.entrypoints=websecure
      - traefik.http.routers.authentication-service.middlewares=http-request-not-found-error@file
      - traefik.http.routers.authentication-service.rule=Host(`tw050x.dev`) && PathPrefix(`/login`)
      - traefik.http.routers.authentication-service.tls=true
      - traefik.http.services.authentication-service.loadbalancer.server.port=3000
    mem_limit: 200mb
    pull_policy: never
    volumes:
      - source: ./tsconfig.json
        target: /srv/tsconfig.json
        type: bind
      - source: ./library
        target: /srv/library
        type: bind
      - source: ./log/authentication-service
        target: /log
        type: bind
      - source: ./service/authentication-service
        target: /srv/service/authentication-service
        type: bind

  error-service:
    command: [ "yarn", "workspace", "@tw050x.net/error-service", "run", "nodemon", "--watch-path=/srv", "artifact/serve.js" ]
    # command: [ "tsx", "--inspect=0.0.0.0:9229", "--watch-path=/srv", "service/error-service/serve.ts" ]
    depends_on:
      assets-service:
        condition: service_healthy
      localstack-service:
        condition: service_healthy
      traefik-service:
        condition: service_healthy
    env_file:
      - .env.error-service
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/healthcheck || exit 1"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
    image: tw050x.net/error-service:latest
    labels:
      - traefik.enable=true
      - traefik.http.routers.error-service.entrypoints=websecure
      - traefik.http.routers.error-service.tls=true
      - traefik.http.services.error-service.loadbalancer.server.port=3000
    mem_limit: 200mb
    pull_policy: never
    volumes:
      - source: ./tsconfig.json
        target: /srv/tsconfig.json
        type: bind
      - source: ./library
        target: /srv/library
        type: bind
      - source: ./log/error-service
        target: /log
        type: bind
      - source: ./service/error-service
        target: /srv/service/error-service
        type: bind

  localstack-service:
    env_file:
      - .env.localstack-service
    # image: localstack/localstack
    image: gresau/localstack-persist:latest # don't trust this
    ports:
      - "127.0.0.1:4566:4566"
      - "127.0.0.1:4510-4559:4510-4559"
    volumes:
      - source: ./service/localstack-service/data
        target: /persisted-data
        type: bind
      - source: /var/run/docker.sock
        target: /var/run/docker.sock
        type: bind

  marketing-service:
    command: [ "yarn", "workspace", "@tw050x.net/marketing-service", "run", "nodemon", "--watch-path=/srv", "artifact/serve.js" ]
    # command: [ "tsx", "--inspect=0.0.0.0:9229", "--watch-path=/srv", "service/marketing-service/serve.ts" ]
    depends_on:
      assets-service:
        condition: service_healthy
      localstack-service:
        condition: service_healthy
      mongo-service:
        condition: service_healthy
      traefik-service:
        condition: service_healthy
    env_file:
      - .env.marketing-service
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/healthcheck || exit 1"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
    image: tw050x.net/marketing-service:latest
    labels:
      - traefik.enable=true
      - traefik.http.routers.marketing-service.entrypoints=websecure
      - traefik.http.routers.marketing-service.middlewares=http-request-not-found-error@file
      - traefik.http.routers.marketing-service.rule=Host(`tw050x.dev`) && PathPrefix(`/`)
      - traefik.http.routers.marketing-service.priority=1
      - traefik.http.routers.marketing-service.tls=true
      - traefik.http.services.marketing-service.loadbalancer.server.port=3000
    mem_limit: 200mb
    pull_policy: never
    volumes:
      - source: ./tsconfig.json
        target: /srv/tsconfig.json
        type: bind
      - source: ./library
        target: /srv/library
        type: bind
      - source: ./log/marketing-service
        target: /log
        type: bind
      - source: ./service/marketing-service
        target: /srv/service/marketing-service
        type: bind

  mongo-service:
    env_file:
      - .env.mongo-service
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    image: mongo:8.0.12
    ports:
      - 27017:27017
    restart: always
    volumes:
      - source: ./service/mongo-service/data
        target: /data/db
        type: bind

  traefik-service:
    image: traefik:v3.3.2
    depends_on:
      traefik-socket:
        condition: service_healthy
    env_file:
      - .env.traefik-service
    healthcheck:
      test: ["CMD-SHELL", "traefik healthcheck --ping"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
    labels:
      - traefik.enable=true
      - traefik.http.routers.traefik-service.entrypoints=websecure
      - traefik.http.routers.traefik-service.rule=Host(`traefik.tw050x.dev`)
      - traefik.http.routers.traefik-service.service=api@internal
      - traefik.http.routers.traefik-service.tls=true
    mem_limit: 200mb
    ports:
      - 80:80
      - 443:443
    restart: always
    volumes:
      - ./service/traefik-service/compose.traefik.toml:/etc/traefik/traefik.toml
      - ./service/traefik-service/certificates:/root/certificates

  traefik-socket:
    image: tecnativa/docker-socket-proxy:0.3.0
    env_file:
      - .env.traefik-service
    healthcheck:
      test: ["CMD-SHELL", "wget --spider http://localhost:2375/version || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    mem_limit: 200mb
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  user-service:
    command: [ "yarn", "workspace", "@tw050x.net/user-service", "run", "nodemon", "--watch-path=/srv", "artifact/serve.js" ]
    # command: [ "tsx", "--inspect=0.0.0.0:9229", "--watch-path=/srv", "service/user-service/serve.ts" ]
    depends_on:
      assets-service:
        condition: service_healthy
      localstack-service:
        condition: service_healthy
      mongo-service:
        condition: service_healthy
      traefik-service:
        condition: service_healthy
    env_file:
      - .env.user-service
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/healthcheck || exit 1"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
    image: tw050x.net/user-service:latest
    labels:
      - traefik.enable=true
      - traefik.http.routers.user-service.entrypoints=websecure
      - traefik.http.routers.user-service.middlewares=http-request-not-found-error@file
      - traefik.http.routers.user-service.rule=Host(`tw050x.dev`) && PathPrefix(`/register`)
      - traefik.http.routers.user-service.tls=true
      - traefik.http.services.user-service.loadbalancer.server.port=3000
    mem_limit: 200mb
    pull_policy: never
    volumes:
      - source: ./tsconfig.json
        target: /srv/tsconfig.json
        type: bind
      - source: ./library
        target: /srv/library
        type: bind
      - source: ./log/user-service
        target: /log
        type: bind
      - source: ./service/user-service
        target: /srv/service/user-service
        type: bind
