
services:

  assets:
    depends_on:
      traefik:
        condition: service_healthy
    env_file:
      - .env.service.assets
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/assets/healthcheck.txt || exit 1"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
    image: tw050x.net/assets:latest
    labels:
      - traefik.enable=true
      - traefik.http.routers.assets.entrypoints=websecure
      - traefik.http.routers.assets.middlewares=http-request-not-found-error@file
      - traefik.http.routers.assets.rule=Host(`tw050x.dev`) && PathPrefix(`/assets/`)
      - traefik.http.routers.assets.tls=true
      - traefik.http.services.assets.loadbalancer.server.port=3000
    mem_limit: 200mb
    pull_policy: never
    volumes:
      - source: ./service/assets/public
        target: /srv/service/assets/public
        type: bind

  authentication:
    command: [ "yarn", "workspace", "@tw050x.net.service/authentication", "run", "nodemon", "--watch-path=/srv", "artifact/serve.js" ]
    # command: [ "tsx", "--inspect=0.0.0.0:9229", "--watch-path=/srv", "service/authentication/serve.ts" ]
    depends_on:
      assets:
        condition: service_healthy
      localstack:
        condition: service_healthy
      mongo-primary:
        condition: service_healthy
      traefik:
        condition: service_healthy
    env_file:
      - .env.database.authentication
      - .env.database.user
      - .env.aws
      - .env.service.authentication
      - .env.services.logs
      - .env.services.mongo-client
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/healthcheck || exit 1"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
    image: tw050x.net/authentication:latest
    labels:
      - traefik.enable=true
      - traefik.http.routers.authentication.entrypoints=websecure
      - traefik.http.routers.authentication.middlewares=http-request-not-found-error@file
      - traefik.http.routers.authentication.rule=Host(`tw050x.dev`) && PathPrefix(`/login`)
      - traefik.http.routers.authentication.tls=true
      - traefik.http.services.authentication.loadbalancer.server.port=3000
    mem_limit: 200mb
    pull_policy: never
    volumes:
      - source: ./tsconfig.json
        target: /srv/tsconfig.json
        type: bind
      - source: ./database
        target: /srv/database
        type: bind
      - source: ./library
        target: /srv/library
        type: bind
      - source: ./log/authentication
        target: /log
        type: bind
      - source: ./service/authentication
        target: /srv/service/authentication
        type: bind

  error:
    command: [ "yarn", "workspace", "@tw050x.net.service/error", "run", "nodemon", "--watch-path=/srv", "artifact/serve.js" ]
    # command: [ "tsx", "--inspect=0.0.0.0:9229", "--watch-path=/srv", "service/error/serve.ts" ]
    depends_on:
      assets:
        condition: service_healthy
      localstack:
        condition: service_healthy
      traefik:
        condition: service_healthy
    env_file:
      - .env.aws
      - .env.service.error
      - .env.services.logs
      - .env.services.mongo-client
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/healthcheck || exit 1"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
    image: tw050x.net/error:latest
    labels:
      - traefik.enable=true
      - traefik.http.routers.error.entrypoints=websecure
      - traefik.http.routers.error.tls=true
      - traefik.http.services.error.loadbalancer.server.port=3000
    mem_limit: 200mb
    pull_policy: never
    volumes:
      - source: ./tsconfig.json
        target: /srv/tsconfig.json
        type: bind
      - source: ./library
        target: /srv/library
        type: bind
      - source: ./log/error
        target: /log
        type: bind
      - source: ./service/error
        target: /srv/service/error
        type: bind

  localstack:
    env_file:
      - .env.service.localstack
    # image: localstack/localstack
    image: gresau/localstack-persist:latest # don't trust this
    ports:
      - "127.0.0.1:4566:4566"
      - "127.0.0.1:4510-4559:4510-4559"
    volumes:
      - source: ./service/localstack/data
        target: /persisted-data
        type: bind
      - source: /var/run/docker.sock
        target: /var/run/docker.sock
        type: bind

  marketing:
    command: [ "yarn", "workspace", "@tw050x.net.service/marketing", "run", "nodemon", "--watch-path=/srv", "artifact/serve.js" ]
    # command: [ "tsx", "--inspect=0.0.0.0:9229", "--watch-path=/srv", "service/marketing/serve.ts" ]
    depends_on:
      assets:
        condition: service_healthy
      localstack:
        condition: service_healthy
      mongo-primary:
        condition: service_healthy
      traefik:
        condition: service_healthy
    env_file:
      - .env.aws
      - .env.database.user
      - .env.service.marketing
      - .env.services.logs
      - .env.services.mongo-client
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/healthcheck || exit 1"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
    image: tw050x.net/marketing:latest
    labels:
      - traefik.enable=true
      - traefik.http.routers.marketing.entrypoints=websecure
      - traefik.http.routers.marketing.middlewares=http-request-not-found-error@file
      - traefik.http.routers.marketing.rule=Host(`tw050x.dev`) && PathPrefix(`/`)
      - traefik.http.routers.marketing.priority=1
      - traefik.http.routers.marketing.tls=true
      - traefik.http.services.marketing.loadbalancer.server.port=3000
    mem_limit: 200mb
    pull_policy: never
    volumes:
      - source: ./tsconfig.json
        target: /srv/tsconfig.json
        type: bind
      - source: ./library
        target: /srv/library
        type: bind
      - source: ./log/marketing
        target: /log
        type: bind
      - source: ./service/marketing
        target: /srv/service/marketing
        type: bind

  mongo-primary:
    command: --replSet rs0 --keyFile /etc/mongo-keyfile --bind_ip_all
    depends_on:
      mongo-secondary-a:
        condition: service_healthy
    env_file:
      - .env.service.mongo
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    image: mongo:8.0.12
    ports:
      - 27017:27017
    restart: always
    volumes:
      - source: ./service/mongo/data/primary
        target: /data/db
        type: bind
      - read_only: true
        source: ./service/mongo/mongo-keyfile
        target: /etc/mongo-keyfile
        type: bind

  mongo-secondary-a:
    command: --replSet rs0 --keyFile /etc/mongo-keyfile --bind_ip_all
    env_file:
      - .env.service.mongo
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    image: mongo:8.0.12
    ports:
      - 27018:27017
    restart: always
    volumes:
      - source: ./service/mongo/data/secondary-a
        target: /data/db
        type: bind
      - read_only: true
        source: ./service/mongo/mongo-keyfile
        target: /etc/mongo-keyfile
        type: bind

  navigation:
    command: [ "yarn", "workspace", "@tw050x.net.service/navigation", "run", "nodemon", "--watch-path=/srv", "artifact/serve.js" ]
    # command: [ "tsx", "--inspect=0.0.0.0:9229", "--watch-path=/srv", "service/navigation/serve.ts" ]
    depends_on:
      assets:
        condition: service_healthy
      localstack:
        condition: service_healthy
      mongo-primary:
        condition: service_healthy
      traefik:
        condition: service_healthy
    env_file:
      - .env.aws
      - .env.database.assignment
      - .env.database.user
      - .env.service.navigation
      - .env.services.logs
      - .env.services.mongo-client
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/healthcheck || exit 1"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
    image: tw050x.net/navigation:latest
    labels:
      - traefik.enable=true
      - traefik.http.routers.navigation.entrypoints=websecure
      - traefik.http.routers.navigation.middlewares=http-request-not-found-error@file
      - traefik.http.routers.navigation.rule=Host(`tw050x.dev`) && PathPrefix(`/navigation/`)
      - traefik.http.routers.navigation.tls=true
      - traefik.http.services.navigation.loadbalancer.server.port=3000
    mem_limit: 200mb
    pull_policy: never
    volumes:
      - source: ./tsconfig.json
        target: /srv/tsconfig.json
        type: bind
      - source: ./library
        target: /srv/library
        type: bind
      - source: ./log/navigation
        target: /log
        type: bind
      - source: ./service/navigation
        target: /srv/service/navigation
        type: bind

  portal:
    command: [ "yarn", "workspace", "@tw050x.net.service/portal", "run", "nodemon", "--watch-path=/srv", "artifact/serve.js" ]
    # command: [ "tsx", "--inspect=0.0.0.0:9229", "--watch-path=/srv", "service/portal/serve.ts" ]
    depends_on:
      assets:
        condition: service_healthy
      authentication:
        condition: service_healthy
      localstack:
        condition: service_healthy
      mongo-primary:
        condition: service_healthy
      traefik:
        condition: service_healthy
    env_file:
      - .env.aws
      - .env.database.assignment
      - .env.database.user
      - .env.service.portal
      - .env.services.logs
      - .env.services.mongo-client
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/healthcheck || exit 1"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
    image: tw050x.net/portal:latest
    labels:
      - traefik.enable=true
      - traefik.http.routers.portal.entrypoints=websecure
      - traefik.http.routers.portal.middlewares=http-request-not-found-error@file
      - traefik.http.routers.portal.rule=Host(`tw050x.dev`) && PathPrefix(`/portal`)
      - traefik.http.routers.portal.tls=true
      - traefik.http.services.portal.loadbalancer.server.port=3000
    mem_limit: 200mb
    pull_policy: never
    volumes:
      - source: ./tsconfig.json
        target: /srv/tsconfig.json
        type: bind
      - source: ./library
        target: /srv/library
        type: bind
      - source: ./log/portal
        target: /log
        type: bind
      - source: ./service/portal
        target: /srv/service/portal
        type: bind

  traefik:
    image: traefik:v3.3.2
    depends_on:
      traefik-socket:
        condition: service_healthy
    env_file:
      - .env.service.traefik
    healthcheck:
      test: ["CMD-SHELL", "traefik healthcheck --ping"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
    labels:
      - traefik.enable=true
      - traefik.http.routers.traefik.entrypoints=websecure
      - traefik.http.routers.traefik.rule=Host(`traefik.tw050x.dev`)
      - traefik.http.routers.traefik.service=api@internal
      - traefik.http.routers.traefik.tls=true
    mem_limit: 200mb
    ports:
      - 80:80
      - 443:443
    restart: always
    volumes:
      - ./service/traefik/compose.traefik.toml:/etc/traefik/traefik.toml
      - ./service/traefik/certificates:/root/certificates

  traefik-socket:
    image: tecnativa/docker-socket-proxy:0.3.0
    env_file:
      - .env.service.traefik
    healthcheck:
      test: ["CMD-SHELL", "wget --spider http://localhost:2375/version || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    mem_limit: 200mb
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  user:
    command: [ "yarn", "workspace", "@tw050x.net.service/user", "run", "nodemon", "--watch-path=/srv", "artifact/serve.js" ]
    # command: [ "tsx", "--inspect=0.0.0.0:9229", "--watch-path=/srv", "service/user/serve.ts" ]
    depends_on:
      assets:
        condition: service_healthy
      localstack:
        condition: service_healthy
      mongo-primary:
        condition: service_healthy
      traefik:
        condition: service_healthy
    env_file:
      - .env.aws
      - .env.database.assignment
      - .env.database.user
      - .env.service.user
      - .env.services.logs
      - .env.services.mongo-client
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/healthcheck || exit 1"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
    image: tw050x.net/user:latest
    labels:
      - traefik.enable=true
      - traefik.http.routers.user.entrypoints=websecure
      - traefik.http.routers.user.middlewares=http-request-not-found-error@file
      - traefik.http.routers.user.rule=Host(`tw050x.dev`) && PathPrefix(`/register`)
      - traefik.http.routers.user.tls=true
      - traefik.http.services.user.loadbalancer.server.port=3000
    mem_limit: 200mb
    pull_policy: never
    volumes:
      - source: ./tsconfig.json
        target: /srv/tsconfig.json
        type: bind
      - source: ./database
        target: /srv/database
        type: bind
      - source: ./library
        target: /srv/library
        type: bind
      - source: ./log/user
        target: /log
        type: bind
      - source: ./service/user
        target: /srv/service/user
        type: bind
