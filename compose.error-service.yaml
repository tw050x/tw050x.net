
services:
  error-service:
    command: [ "yarn", "workspace", "@tw050x.net.service/error-service", "run", "nodemon", "--inspect=0.0.0.0:9229", "--watch", "/srv", "artifact/serve.js" ]
    depends_on:
      assets-service:
        condition: service_healthy
      traefik-service:
        condition: service_healthy
    environment:
      - LOGS_LEVEL=info
      - LOGS_DIRECTORY=/log
      - MONGO_CLIENT_AUTH_PASSWORD=password
      - MONGO_CLIENT_AUTH_USERNAME=root
      - MONGO_CLIENT_REPLICA_SET=rs0
      - MONGO_CLIENT_URI=mongodb://mongo-service-primary:27017,mongo-service-secondary-a:27017
      - NODE_ENV=development
    healthcheck:
      test: ["CMD-SHELL", "test -f /healthcheck && grep -q '^healthy$' /healthcheck"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
    image: tw050x.net.service/error-service:latest
    labels:
      - traefik.docker.network=services
      - traefik.enable=true
      - traefik.http.routers.error-service.entrypoints=websecure
      - traefik.http.routers.error-service.tls=true
      - traefik.http.services.error-service.loadbalancer.server.port=3000
      - traefik.http.services.error-service.loadbalancer.server.scheme=https
      - traefik.http.services.error-service.loadbalancer.serversTransport=secure@file
    mem_limit: 512mb
    networks:
      services: {}
    ports:
      - "9202:9229"
    pull_policy: never
    volumes:
      - source: ./.configs
        target: /srv/.configs
        type: bind
      - source: ./.secrets
        target: /srv/.secrets
        type: bind
      - source: ./ca
        target: /srv/ca
        type: bind
      - source: ./certificates
        target: /srv/certificates
        type: bind
      - source: ./library
        target: /srv/library
        type: bind
      - source: ./log/service/error-service
        target: /log
        type: bind
      - source: ./service/error-service
        target: /srv/service/error-service
        type: bind
      - source: ./tsconfig.json
        target: /srv/tsconfig.json
        type: bind
