
services:
  user:
    command: [ "yarn", "workspace", "@tw050x.net.service/user", "run", "nodemon", "--inspect=0.0.0.0:9229", "--watch", "/srv", "artifact/serve.js" ]
    depends_on:
      assets:
        condition: service_healthy
      error:
        condition: service_healthy
      mongo-primary:
        condition: service_healthy
      traefik:
        condition: service_healthy
    env_file:
      - .env.database.assignment
      - .env.database.user
      - .env.service.user
      - .env.services.logs
      - .env.services.mongo-client
      - .env.services.rabbitmq-client
    healthcheck:
      test: ["CMD-SHELL", "curl -f --insecure https://localhost:3000/healthcheck || exit 1"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
    image: tw050x.net.service/user:latest
    labels:
      - traefik.enable=true
      - traefik.http.routers.user.entrypoints=websecure
      - traefik.http.routers.user.middlewares=http-request-not-found-error@file
      - traefik.http.routers.user.rule=Host(`tw050x.dev`) && (Path(`/logout`) || Path(`/register`) || PathPrefix(`/login`) || PathPrefix(`/token/`) || PathPrefix(`/oauth2/`))
      - traefik.http.routers.user.tls=true
      - traefik.http.services.user.loadbalancer.server.port=3000
      - traefik.http.services.user.loadbalancer.server.scheme=https
      - traefik.http.services.user.loadbalancer.serversTransport=secure@file
    mem_limit: 512mb
    networks:
      services:
        aliases:
          - user.service.internal
    ports:
      - "9206:9229"
    pull_policy: never
    volumes:
      - source: ./.configs
        target: /srv/.configs
        type: bind
      - source: ./.secrets
        target: /srv/.secrets
        type: bind
      - source: ./ca
        target: /srv/ca
        type: bind
      - source: ./certificates
        target: /srv/certificates
        type: bind
      - source: ./database
        target: /srv/database
        type: bind
      - source: ./library
        target: /srv/library
        type: bind
      - source: ./log/service/user
        target: /log
        type: bind
      - source: ./service/user
        target: /srv/service/user
        type: bind
      - source: ./tsconfig.json
        target: /srv/tsconfig.json
        type: bind
