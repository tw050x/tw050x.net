
services:
  mongo-service-primary:
    command: --replSet rs0 --keyFile /etc/mongo-keyfile --bind_ip_all
    depends_on:
      mongo-service-secondary-a:
        condition: service_healthy
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=password
      - MONGO_REPLICA_SET_NAME=rs0
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    image: mongo:8.0.12
    networks:
      mongo-service: {}
    ports:
      - 27017:27017
    restart: always
    volumes:
      - source: ./service/mongo-service/data/primary
        target: /data/db
        type: bind
      - read_only: true
        source: ./service/mongo-service/mongo-keyfile
        target: /etc/mongo-keyfile
        type: bind

  mongo-service-secondary-a:
    command: --replSet rs0 --keyFile /etc/mongo-keyfile --bind_ip_all
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=password
      - MONGO_REPLICA_SET_NAME=rs0
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    image: mongo:8.0.12
    networks:
      mongo-service: {}
    ports:
      - 27018:27017
    restart: always
    volumes:
      - source: ./service/mongo-service/data/secondary-a
        target: /data/db
        type: bind
      - read_only: true
        source: ./service/mongo-service/mongo-keyfile
        target: /etc/mongo-keyfile
        type: bind
