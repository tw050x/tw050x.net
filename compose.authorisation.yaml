
services:
  authorisation:
    command: [ "yarn", "workspace", "@tw050x.net.service/authorisation", "exec", "node", "--inspect=0.0.0.0:9229", "--watch", "artifact/serve.js" ]
    depends_on:
      assets:
        condition: service_healthy
      traefik:
        condition: service_healthy
    environment:
      - NODE_ENV=development
    healthcheck:
      test: ["CMD-SHELL", "test -f /healthcheck && grep -q '^healthy$' /healthcheck"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
    image: tw050x.net.service/authorisation:latest
    labels:
      - traefik.docker.network=services
      - traefik.enable=true
      - traefik.http.routers.authorisation.entrypoints=websecure
      - traefik.http.routers.authorisation.tls=true
      - traefik.http.services.authorisation.loadbalancer.server.port=3000
      - traefik.http.services.authorisation.loadbalancer.server.scheme=https
      - traefik.http.services.authorisation.loadbalancer.serversTransport=secure@file
    mem_limit: 512mb
    networks:
      mongo: {}
      services: {}
    ports:
      - "9201:9229"
    pull_policy: never
    volumes:
      - source: ./.configs
        target: /srv/.configs
        type: bind
      - source: ./.secrets
        target: /srv/.secrets
        type: bind
      - source: ./ca
        target: /srv/ca
        type: bind
      - source: ./certificates
        target: /srv/certificates
        type: bind
      - source: ./library
        target: /srv/library
        type: bind
      - source: ./log/service/authorisation
        target: /log
        type: bind
      - source: ./service/authorisation
        target: /srv/service/authorisation
        type: bind
      - source: ./tsconfig.json
        target: /srv/tsconfig.json
        type: bind
