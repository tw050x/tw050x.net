
services:
  navigation-service:
    command: [ "yarn", "workspace", "@tw050x.net.service/navigation-service", "run", "nodemon", "--inspect=0.0.0.0:9229", "--watch", "/srv", "artifact/serve.js" ]
    depends_on:
      assets-service:
        condition: service_healthy
      error-service:
        condition: service_healthy
      mongo-service-primary:
        condition: service_healthy
      traefik-service:
        condition: service_healthy
    environment:
      - ACCOUNT_DATABASE_NAME=account
      - ACCOUNT_DATABASE_BILLING_COLLECTION_NAME=billing
      - ACCOUNT_DATABASE_INVITATION_COLLECTION_NAME=invitations
      - ACCOUNT_DATABASE_MEMBERSHIP_COLLECTION_NAME=memberships
      - ACCOUNT_DATABASE_PROFILE_COLLECTION_NAME=profiles
      - ASSIGNMENT_DATABASE_NAME=assignments
      - ASSIGNMENT_DATABASE_TASK_COLLECTION_NAME=tasks
      - ASSIGNMENT_DATABASE_TASK_TEMPLATE_COLLECTION_NAME=task-templates
      - LOGS_LEVEL=info
      - LOGS_DIRECTORY=/log
      - MONGO_CLIENT_AUTH_PASSWORD=password
      - MONGO_CLIENT_AUTH_USERNAME=root
      - MONGO_CLIENT_REPLICA_SET=rs0
      - MONGO_CLIENT_URI=mongodb://mongo-service-primary:27017,mongo-service-secondary-a:27017
      - NODE_ENV=development
      - USER_DATABASE_NAME=users
      - USER_DATABASE_CREDENTIALS_COLLECTION_NAME=credentials
      - USER_DATABASE_NONCES_COLLECTION_NAME=nonces
      - USER_DATABASE_PERMISSIONS_COLLECTION_NAME=permissions
      - USER_DATABASE_PROFILE_COLLECTION_NAME=profiles
    healthcheck:
      test: ["CMD-SHELL", "test -f /healthcheck && grep -q '^healthy$' /healthcheck"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
    image: tw050x.net.service/navigation-service:latest
    labels:
      - traefik.docker.network=services
      - traefik.enable=true
      - traefik.http.routers.navigation-service.entrypoints=websecure
      - traefik.http.routers.navigation-service.middlewares=http-request-not-found-error@file
      - traefik.http.routers.navigation-service.rule=Host(`tw050x.dev`) && PathPrefix(`/navigation/`)
      - traefik.http.routers.navigation-service.tls=true
      - traefik.http.services.navigation-service.loadbalancer.server.port=3000
      - traefik.http.services.navigation-service.loadbalancer.server.scheme=https
      - traefik.http.services.navigation-service.loadbalancer.serversTransport=secure@file
    mem_limit: 512mb
    networks:
      mongo-service: {}
      services: {}
    ports:
      - "9204:9229"
    pull_policy: never
    volumes:
      - source: ./.configs
        target: /srv/.configs
        type: bind
      - source: ./.secrets
        target: /srv/.secrets
        type: bind
      - source: ./ca
        target: /srv/ca
        type: bind
      - source: ./certificates
        target: /srv/certificates
        type: bind
      - source: ./library
        target: /srv/library
        type: bind
      - source: ./log/service/navigation-service
        target: /log
        type: bind
      - source: ./service/navigation-service
        target: /srv/service/navigation-service
        type: bind
      - source: ./tsconfig.json
        target: /srv/tsconfig.json
        type: bind
